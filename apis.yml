aid: thegamesdb
name: TheGamesDB
description: An open, online database for video game fans providing game information, artwork, and metadata via API.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
